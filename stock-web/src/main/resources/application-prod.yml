# 企业微信机器人 Webhook 配置（支持多市场）
# 美股推送
WECOM_WEBHOOK_URL_US: ${WECOM_WEBHOOK_URL_US:}
# A股推送
WECOM_WEBHOOK_URL_A: ${WECOM_WEBHOOK_URL_A:}
# 港股推送（预留）
WECOM_WEBHOOK_URL_HK: ${WECOM_WEBHOOK_URL_HK:}
# 兼容旧配置：如果以上配置为空，将使用此默认配置
WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:}

server:
  port: 8888
spring:
  datasource: # 数据源的相关配置
    type: com.zaxxer.hikari.HikariDataSource      # 数据源的类型，可以更改为其他的数据源配置，比如druid
    driver-class-name: com.mysql.cj.jdbc.Driver      # mysql/MariaDB 的数据库驱动类名称
    url: ${STOCK_WEB_DB_URL}
    username: ${STOCK_WEB_DB_USERNAME}
    password: ${STOCK_WEB_DB_PASSWORD}
    hikari:
      pool-name: DataSourceHikariCP           # 连接池的名字
      connection-timeout: 30000               # 等待连接池分配连接的最大时间（毫秒），超过这个时长还没有可用的连接，则会抛出SQLException
      minimum-idle: 1                         # 保持少量热连接，避免大量空闲连接在代理层被静默回收
      maximum-pool-size: 20                   # 最大连接数
      auto-commit: true                       # 自动提交
      idle-timeout: 300000                    # 让多余空闲连接更快退场，减少拿到僵尸连接的概率
      max-lifetime: 840000                    # 小于数据库/代理侧空闲断链阈值，主动淘汰老连接
      keepalive-time: 240000                  # 定期保活最小空闲连接，避免长时间静默后被对端重置
      validation-timeout: 5000                # 连接校验超时时间
      connection-test-query: SELECT 1
