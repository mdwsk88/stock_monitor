spring:
  application:
    name: us-stock-monitor-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  lifecycle:
    timeout-per-shutdown-phase: 20s
  ai:
    openai:
      api-key: ${STOCK_OPENAI_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${STOCK_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com}}
      chat:
        options:
          model: ${STOCK_OPENAI_CHAT_MODEL:${OPENAI_CHAT_MODEL:gpt-4o-mini}}
          temperature: 0.7

logging:
  level:
    root: info

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never


# MyBatisPlus 的配置
mybatis-plus:
  global-config:
    db-config:
      id-type:
      update-strategy: not_empty
  mapper-locations: classpath*:/mappers/*.xml


baidu:
  translate:
    host: ${BAIDU_TRANSLATE_HOST:https://fanyi-api.baidu.com/api/trans/vip/translate}
    appid: ${BAIDU_TRANSLATE_APPID}
    securityKey: ${BAIDU_TRANSLATE_SECURITYKEY}

dingding:
  token: ${DINGDING_TOKEN}
  secret: ${DINGDING_SECRET}
  userid: ${DINGDING_USERID}

# 股票异动过滤配置 - 宁缺毋滥原则
stock:
  push:
    # 当前阶段聚焦 A 股，先关闭所有美股推送（晨报/夜报/实时异动）。
    # 如需恢复，改为 true 即可。
    us-enabled: false
  filter:
    # 异动频次阈值 - 24小时内同一标的出现次数低于此值将被过滤
    # 默认10次，建议生产环境保持10-15次
    frequency-threshold: 2
    # A股实时推送最低事件分：只把真正有交易含义的公告即时推送到群里
    a-realtime-signal-threshold: 70
    # A股晨报/晚报最低事件分：低于该分数的公告即使入库也不会进入榜单
    a-ranking-signal-threshold: 60
    # A股每次抓取最多回扫页数，避免晚间集中披露时只扫到第一页
    a-fetch-page-count: 5
    # 同一股票在该窗口内的同类公告会被聚成一个事件簇，避免把财报打包披露当成多次异动
    a-cluster-window-minutes: 15
    # 黑名单关键词列表 - 用于过滤行政流水账类噪音
    # 已内置以下类别：会议类、人事变动类、资金类（日常运营）、自查/合规类、关联交易/担保类、期权激励类、质押类、其他常规行政公告
    # 如需自定义，可在此覆盖或添加
