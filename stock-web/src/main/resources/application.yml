spring:
  application:
    name: us-stock-monitor-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
          temperature: 0.7

logging:
  level:
    root: info


# MyBatisPlus 的配置
mybatis-plus:
  global-config:
    db-config:
      id-type:
      update-strategy: not_empty
  mapper-locations: classpath*:/mappers/*.xml


baidu:
  translate:
    host: ${BAIDU_TRANSLATE_HOST:https://fanyi-api.baidu.com/api/trans/vip/translate}
    appid: ${BAIDU_TRANSLATE_APPID}
    securityKey: ${BAIDU_TRANSLATE_SECURITYKEY}

dingding:
  token: ${DINGDING_TOKEN}
  secret: ${DINGDING_SECRET}
  userid: ${DINGDING_USERID}

# 股票异动过滤配置 - 宁缺毋滥原则
stock:
  filter:
    # 异动频次阈值 - 24小时内同一标的出现次数低于此值将被过滤
    # 默认10次，建议生产环境保持10-15次
    frequency-threshold: 2
    # 黑名单关键词列表 - 用于过滤行政流水账类噪音
    # 已内置以下类别：会议类、人事变动类、资金类（日常运营）、自查/合规类、关联交易/担保类、期权激励类、质押类、其他常规行政公告
    # 如需自定义，可在此覆盖或添加
