spring:
  application:
    name: a-stock-mcp-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  main:
    web-application-type: reactive
  ai:
    mcp:
      server:
        name: a-stock-monitor-mcp-server-sse      # MCP服务器名称
        version: 1.0.0                            # 服务器版本号
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message
        type: async                               # 异步
  mail:
    host: ${SMTP_HOST:smtp.163.com}                            # 邮箱host
    port: ${SMTP_PORT:465}                                     # 邮箱固定端口
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    protocol: smtp                                # 邮箱协议
    default-encoding: UTF-8                       # 默认编码
    properties:
      mail:
        smtp:
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
          ssl:
            enable: true

# MyBatisPlus 的配置
mybatis-plus:
  global-config:
    db-config:
      id-type:
      update-strategy: not_empty
  mapper-locations: classpath*:/mappers/*.xml

logging:
  level:
    root: info
