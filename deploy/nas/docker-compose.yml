name: stock-monitor

services:
  stock-web:
    image: ${STOCK_WEB_IMAGE:-stock-monitor-web:latest}
    container_name: stock-monitor-web
    restart: unless-stopped
    init: true
    network_mode: host
    env_file:
      - ./env/stock-web.env
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8888/actuator/health | grep '\"status\":\"UP\"' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
